<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Film Festival — Gate Scanner</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #e94560;
      --dark:   #0f0f1a;
      --navy:   #16213e;
      --mid:    #1a1a2e;
      --card:   #1e1e32;
      --green:  #00e676;
      --amber:  #ffab00;
      --text:   #e0e0e0;
      --muted:  #888;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── Header ── */
    header {
      width: 100%;
      background: linear-gradient(135deg, var(--mid), var(--navy));
      padding: 18px 20px 14px;
      text-align: center;
      border-bottom: 2px solid var(--red);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 {
      font-size: 1.3rem;
      letter-spacing: 2px;
      color: #fff;
    }
    header h1 span { color: var(--red); }
    header p  { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }

    /* ── Main ── */
    main {
      width: 100%;
      max-width: 480px;
      padding: 20px 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* ── Scanner Box ── */
    .scanner-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid #333;
    }
    .scanner-label {
      background: var(--navy);
      padding: 10px 16px;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .scanner-label .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.4; transform:scale(1.5); }
    }

    #reader {
      width: 100%;
      min-height: 260px;
      background: #000;
    }
    /* Hide the extra UI injected by html5-qrcode */
    #reader__dashboard { display: none !important; }
    #reader__scan_region img { display:none; }

    /* ── Result Panel ── */
    .result-panel {
      border-radius: 14px;
      padding: 20px;
      text-align: center;
      transition: all .3s ease;
      border: 2px solid transparent;
      display: none;
    }
    .result-panel.success {
      background: rgba(0,230,118,.08);
      border-color: var(--green);
      display: block;
    }
    .result-panel.duplicate {
      background: rgba(255,171,0,.08);
      border-color: var(--amber);
      display: block;
    }
    .result-panel.error {
      background: rgba(233,69,96,.08);
      border-color: var(--red);
      display: block;
    }
    .result-panel .icon {
      font-size: 3rem;
      margin-bottom: 8px;
    }
    .result-panel .status-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .result-panel.success .status-title { color: var(--green); }
    .result-panel.duplicate .status-title { color: var(--amber); }
    .result-panel.error .status-title { color: var(--red); }

    .result-panel .student-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
    }
    .result-panel .student-id {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── Loading ── */
    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 18px;
      background: var(--card);
      border-radius: 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }
    .loading.show { display: flex; }
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid #333;
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* ── Stats Bar ── */
    .stats-bar {
      display: flex;
      gap: 12px;
    }
    .stat-card {
      flex: 1;
      background: var(--card);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      border: 1px solid #2a2a3e;
    }
    .stat-card .num {
      font-size: 1.8rem;
      font-weight: 700;
    }
    .stat-card .lbl {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }
    .stat-card.s { --accent: var(--green); }
    .stat-card.d { --accent: var(--amber); }
    .stat-card.e { --accent: var(--red);  }
    .stat-card .num { color: var(--accent); }

    /* ── Log ── */
    .log-section h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .log-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 260px;
      overflow-y: auto;
    }
    .log-entry {
      background: var(--card);
      border-radius: 10px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      border-left: 3px solid transparent;
      animation: slideIn .3s ease;
    }
    @keyframes slideIn {
      from { opacity:0; transform:translateY(-8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .log-entry.success  { border-color: var(--green); }
    .log-entry.duplicate{ border-color: var(--amber); }
    .log-entry.error    { border-color: var(--red);  }
    .log-entry .log-icon{ font-size:1.1rem; flex-shrink:0; }
    .log-entry .log-body{ flex:1; }
    .log-entry .log-id  { font-size:0.72rem; color:var(--muted); }
    .log-entry .log-time{ font-size:0.7rem; color:var(--muted); margin-left:auto; white-space:nowrap; }

    /* ── Scan Again button ── */
    .btn-scan {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-scan:hover { opacity: .85; }
    .btn-scan:disabled { opacity:.4; cursor:not-allowed; }
  </style>
</head>
<body>

<header>
  <h1>🎬 <span>FILM FESTIVAL</span> 2026</h1>
  <p>Gate Entry Scanner — Security Interface</p>
</header>

<main>

  <!-- Scanner -->
  <div class="scanner-card">
    <div class="scanner-label">
      <div class="dot"></div>
      Camera Live — Point at QR Code
    </div>
    <div id="reader"></div>
  </div>

  <!-- Loading indicator -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    Verifying with database…
  </div>

  <!-- Result -->
  <div class="result-panel" id="resultPanel">
    <div class="icon" id="resultIcon"></div>
    <div class="status-title" id="resultTitle"></div>
    <div class="student-name" id="resultName"></div>
    <div class="student-id"   id="resultId"></div>
  </div>

  <!-- Scan again (shown after result) -->
  <button class="btn-scan" id="btnScan" style="display:none" onclick="resumeScanning()">
    📷 Scan Next Student
  </button>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-card s">
      <div class="num" id="cntSuccess">0</div>
      <div class="lbl">Admitted</div>
    </div>
    <div class="stat-card d">
      <div class="num" id="cntDupe">0</div>
      <div class="lbl">Duplicates</div>
    </div>
    <div class="stat-card e">
      <div class="num" id="cntErr">0</div>
      <div class="lbl">Errors</div>
    </div>
  </div>

  <!-- Log -->
  <div class="log-section">
    <h3>📋 Scan Log</h3>
    <div class="log-list" id="logList">
      <div style="color:var(--muted);font-size:.8rem;text-align:center;padding:20px;">
        No scans yet today
      </div>
    </div>
  </div>

</main>

<script>
  // ════════════════════════════════════════════════════════
  //  ⚙️  Uses the /api/scan Vercel proxy — no CORS issues!
  //  Apps Script URL is configured in api/scan.js (not here)
  // ════════════════════════════════════════════════════════
  var SCAN_ENDPOINT = '/api/scan';  // Vercel serverless proxy
  // ════════════════════════════════════════════════════════


  // ── State ────────────────────────────────────────────────
  var counts      = { success: 0, duplicate: 0, error: 0 };
  var scanner     = null;
  var scanning    = false;
  var lastScan    = '';
  var lastScanTime = 0;

  // ── Init ─────────────────────────────────────────────────
  function initScanner() {
    scanner = new Html5Qrcode('reader');
    startScanning();
  }


  function startScanning() {
    if (scanning) return;
    scanning = true;
    scanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 230, height: 230 } },
      onScanSuccess,
      onScanError
    ).catch(function(err) {
      showResult('error', '📷', 'Camera Error', 'Please allow camera access and reload', '');
      scanning = false;
    });
  }

  function stopScanning() {
    if (!scanning) return;
    scanning = false;
    scanner.stop().catch(function(){});
  }

  // ── QR Decoded ───────────────────────────────────────────
  function onScanSuccess(decodedText) {
    var now = Date.now();
    if (decodedText === lastScan && now - lastScanTime < 4000) return;
    lastScan     = decodedText;
    lastScanTime = now;

    stopScanning();
    showLoading(true);
    hideResult();

    // ── Call Vercel proxy → Apps Script (no CORS) ─────────
    var url = SCAN_ENDPOINT + '?id=' + encodeURIComponent(decodedText);

    fetch(url)
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(onServerResponse)
      .catch(function(err) {
        onServerError(err);
      });
  }

  function onScanError(err) { /* silent — fires on every non-QR frame */ }

  // ── Handle API response ───────────────────────────────────
  function onServerResponse(result) {
    showLoading(false);

    if (result.status === 'success') {
      showResult('success', '✅', 'Entry Granted', result.name, result.id);
      counts.success++;
      addLog('success', '✅', result.name, result.id);
    } else if (result.status === 'duplicate') {
      showResult('duplicate', '⚠️', 'Already Scanned', result.name, result.id);
      counts.duplicate++;
      addLog('duplicate', '⚠️', result.name, result.id);
    } else if (result.status === 'not_found') {
      showResult('error', '❌', 'Not Registered', result.message, '');
      counts.error++;
      addLog('error', '❌', result.message, '');
    } else {
      showResult('error', '🔴', 'Error', result.message || 'Unknown error', '');
      counts.error++;
      addLog('error', '🔴', result.message || 'Error', '');
    }

    updateStats();
    document.getElementById('btnScan').style.display = 'block';
  }

  function onServerError(err) {
    showLoading(false);
    showResult('error', '🔴', 'Connection Error',
      'Could not reach the database. Check your WEBAPP_URL.', '');
    counts.error++;
    updateStats();
    addLog('error', '🔴', 'Connection Error', '');
    document.getElementById('btnScan').style.display = 'block';
  }

  // ── Scan Next ────────────────────────────────────────────
  function resumeScanning() {
    hideResult();
    document.getElementById('btnScan').style.display = 'none';
    lastScan = '';
    startScanning();
  }

  // ── UI Helpers ───────────────────────────────────────────
  function showLoading(on) {
    document.getElementById('loading').className = 'loading' + (on ? ' show' : '');
  }

  function showResult(type, icon, title, name, id) {
    var p = document.getElementById('resultPanel');
    p.className = 'result-panel ' + type;
    document.getElementById('resultIcon').textContent  = icon;
    document.getElementById('resultTitle').textContent = title;
    document.getElementById('resultName').textContent  = name;
    document.getElementById('resultId').textContent    = id ? ('ID: ' + id) : '';
    if (navigator.vibrate) {
      navigator.vibrate(type === 'success' ? [100] : [100, 50, 100]);
    }
  }

  function hideResult() {
    document.getElementById('resultPanel').className = 'result-panel';
  }

  function updateStats() {
    document.getElementById('cntSuccess').textContent = counts.success;
    document.getElementById('cntDupe').textContent    = counts.duplicate;
    document.getElementById('cntErr').textContent     = counts.error;
  }

  function addLog(type, icon, name, id) {
    var list = document.getElementById('logList');
    var placeholder = list.querySelector('div[style]');
    if (placeholder) placeholder.remove();

    var now  = new Date();
    var time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    var entry = document.createElement('div');
    entry.className = 'log-entry ' + type;
    entry.innerHTML =
      '<span class="log-icon">' + icon + '</span>' +
      '<div class="log-body">' +
        '<div>' + (name || 'Unknown') + '</div>' +
        (id ? '<div class="log-id">ID: ' + id + '</div>' : '') +
      '</div>' +
      '<div class="log-time">' + time + '</div>';
    list.insertBefore(entry, list.firstChild);
  }

  window.addEventListener('load', initScanner);
</script>
</body>
</html>
